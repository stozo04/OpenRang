<!doctype html>
<html><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0}
  .wrap{
    width:1024px;height:500px;box-sizing:border-box;display:flex;align-items:center;overflow:hidden;
    font-family:"Segoe UI",Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 86% 22%, rgba(124,77,255,0.45), transparent 46%),
      radial-gradient(circle at 10% 96%, rgba(255,82,82,0.42), transparent 45%),
      linear-gradient(135deg,#1a1430 0%,#0f0b1a 55%,#0a0810 100%);
  }
  .text{padding-left:84px;flex:1}
  .name{font-size:104px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;margin:0}
  .tag{font-size:34px;font-weight:500;color:#c9c3da;margin:18px 0 0}
  .sub{font-size:26px;font-weight:600;color:#9b93b8;letter-spacing:.5px;margin:16px 0 0}
  /* The real launcher infinity (neon, transparent) — same art as the app icon, on the gradient. */
  .mark{flex:none;width:470px;height:470px;margin-right:18px}
  .mark img{width:100%;height:100%;display:block;filter:drop-shadow(0 0 26px rgba(124,77,255,.45))}
</style></head>
<body>
  <div class="wrap">
    <div class="text">
      <p class="name">OpenLoop</p>
      <p class="tag">Speed-controlled video loops</p>
      <p class="sub">100% on-device · no ads · open source</p>
    </div>
    <div class="mark"><img src="../../app/src/main/res/drawable-nodpi/ic_launcher_foreground.png" alt=""></div>
  </div>
</body></html>
